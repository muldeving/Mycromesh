<?xml version="1.0" encoding="UTF-8"?>
<!--
  Guide bouton MMS – légende PCB sérigraphie
  Taille physique : 25 mm × 20 mm
  1 unité SVG = 0,1 mm  |  trait min = 1,5 u = 0,15 mm  |  texte min = 8 u = 0,8 mm
  NOTE : convertir les textes en tracés (Inkscape > Texte > Convertir en chemin)
         avant import dans le logiciel EDA.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 250 200"
     width="25mm" height="20mm">

  <!-- ══════════════════════════════════════════
       BOUTON – label "ACT"
       ══════════════════════════════════════════ -->
  <text x="125" y="22" font-size="14" font-weight="bold"
        font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">ACT</text>

  <!-- flèche vers mode sélection -->
  <line x1="125" y1="28" x2="125" y2="48"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="118,45 132,45 125,52" fill="#000"/>

  <!-- ══════════════════════════════════════════
       SÉLECTION – LED clignotement rapide
       Zigzag serré = impulsions rapides
       ══════════════════════════════════════════ -->
  <rect x="75" y="53" width="100" height="22" rx="3"
        fill="none" stroke="#000" stroke-width="1.5"/>
  <path d="M83,64 L89,57 L96,71 L103,57 L110,71 L117,57
           L124,71 L131,57 L138,71 L145,57 L152,64"
        fill="none" stroke="#000" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- fourche principale 1× / 2× -->
  <line x1="125" y1="75" x2="125" y2="87"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="57"  y1="87" x2="193" y2="87"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="57"  y1="87" x2="57"  y2="97"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="193" y1="87" x2="193" y2="97"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>

  <text x="57"  y="96" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">1×</text>
  <text x="193" y="96" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">2×</text>

  <!-- ══════════════════════════════════════════
       MAINTENANCE – LED allumée en continu
       Rectangle plein = LED fixe
       ══════════════════════════════════════════ -->
  <rect x="10" y="99" width="94" height="15" rx="2" fill="#000"/>

  <!-- fourche NRM / MNT -->
  <line x1="57" y1="114" x2="57"  y2="123"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="123" x2="90"  y2="123"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="123" x2="24"  y2="131"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="90" y1="123" x2="90"  y2="131"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>

  <text x="24" y="130" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">1×</text>
  <text x="90" y="130" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">2×</text>

  <text x="24" y="147" font-size="11" font-weight="bold"
        font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">NRM</text>
  <text x="90" y="147" font-size="11" font-weight="bold"
        font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">MNT</text>

  <!-- ══════════════════════════════════════════
       E/S – LED lente (défaut allumé / courte extinction)
       Deux rectangles pleins + gap = long ON, bref OFF
       ══════════════════════════════════════════ -->
  <rect x="143" y="99" width="58" height="15" rx="2" fill="#000"/>
  <rect x="208" y="99" width="24" height="15" rx="2" fill="#000"/>

  <!-- fourche OFF / USB / BLE -->
  <line x1="193" y1="114" x2="193" y2="123"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="159" y1="123" x2="225" y2="123"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="159" y1="123" x2="159" y2="131"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="193" y1="123" x2="193" y2="131"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="225" y1="123" x2="225" y2="131"
        stroke="#000" stroke-width="1.5" stroke-linecap="round"/>

  <text x="159" y="130" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">1×</text>
  <text x="193" y="130" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">2×</text>
  <text x="225" y="130" font-size="8" font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">3×</text>

  <text x="159" y="147" font-size="11" font-weight="bold"
        font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">OFF</text>
  <text x="193" y="147" font-size="11" font-weight="bold"
        font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">USB</text>
  <text x="225" y="147" font-size="11" font-weight="bold"
        font-family="Arial,Helvetica,sans-serif"
        fill="#000" text-anchor="middle">BLE</text>

</svg>
